<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img" aria-labelledby="title desc">
  <title id="title">Browser architecture diagram</title>
  <desc id="desc">Diagram showing browser interface, network stack, and renderer connected by arrows.</desc>
  <rect width="640" height="440" fill="#fff"/>
  <rect x="32" y="32" width="576" height="376" rx="20" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="3"/>
  <rect x="68" y="82" width="152" height="96" rx="14" fill="#dce8ff" stroke="#6b92e8" stroke-width="3"/>
  <rect x="244" y="82" width="152" height="96" rx="14" fill="#e7f6df" stroke="#6fa154" stroke-width="3"/>
  <rect x="420" y="82" width="152" height="96" rx="14" fill="#ffe7cf" stroke="#c67a2d" stroke-width="3"/>
  <rect x="68" y="256" width="152" height="96" rx="14" fill="#f3ddff" stroke="#9360c7" stroke-width="3"/>
  <rect x="244" y="256" width="152" height="96" rx="14" fill="#ffe5e5" stroke="#c15d5d" stroke-width="3"/>
  <rect x="420" y="256" width="152" height="96" rx="14" fill="#def2f7" stroke="#4b8ba1" stroke-width="3"/>
  <g fill="#202122" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">
    <text x="144" y="122">Browser UI</text>
    <text x="144" y="150">Tabs, address bar</text>
    <text x="320" y="122">Network stack</text>
    <text x="320" y="150">DNS, TLS, HTTP</text>
    <text x="496" y="122">Renderer</text>
    <text x="496" y="150">HTML, CSS, JS</text>
    <text x="144" y="296">Storage</text>
    <text x="144" y="324">Cache, cookies</text>
    <text x="320" y="296">Scheduler</text>
    <text x="320" y="324">Priority, timing</text>
    <text x="496" y="296">Compositor</text>
    <text x="496" y="324">Layers, pixels</text>
  </g>
  <g stroke="#54595d" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M220 130 H244"/>
    <path d="M396 130 H420"/>
    <path d="M144 178 V256"/>
    <path d="M320 178 V256"/>
    <path d="M496 178 V256"/>
  </g>
</svg>
